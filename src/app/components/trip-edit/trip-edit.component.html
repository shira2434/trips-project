<div class="edit-container">
  <h2>עריכת טיול</h2>
  
  <form [formGroup]="tripForm" (ngSubmit)="updateTrip()" class="trip-form">
    <div class="form-group">
      <label>שם הטיול</label>
      <input formControlName="name">
    </div>

    <div class="form-group">
      <label>יעד</label>
      <input formControlName="destination">
    </div>

    <div class="form-group">
      <label>תאריך התחלה</label>
      <input formControlName="startDate" type="date">
    </div>

    <div class="form-group">
      <label>תאריך סיום</label>
      <input formControlName="endDate" type="date">
    </div>

    <div class="form-group">
      <label>מחיר</label>
      <input formControlName="price" type="number">
    </div>

    <div class="form-group">
      <label>תיאור</label>
      <textarea formControlName="description"></textarea>
    </div>

    <div class="form-group">
      <label>קישור לתמונה</label>
      <input formControlName="image">
    </div>

    <div class="form-buttons">
      <button type="submit" class="btn-primary">עדכן</button>
      <button type="button" (click)="cancel()" class="btn-secondary">ביטול</button>
    </div>
  </form>
</div>
