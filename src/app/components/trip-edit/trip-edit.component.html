<div class="edit-container">
  <h2>עריכת טיול</h2>
  
  <form (ngSubmit)="updateTrip()" class="trip-form">
    <div class="form-group">
      <label>שם הטיול</label>
      <input [(ngModel)]="trip.name" name="name" required>
    </div>

    <div class="form-group">
      <label>יעד</label>
      <input [(ngModel)]="trip.destination" name="destination" required>
    </div>

    <div class="form-group">
      <label>תאריך התחלה</label>
      <input [(ngModel)]="trip.startDate" name="startDate" type="date" required>
    </div>

    <div class="form-group">
      <label>תאריך סיום</label>
      <input [(ngModel)]="trip.endDate" name="endDate" type="date" required>
    </div>

    <div class="form-group">
      <label>מחיר</label>
      <input [(ngModel)]="trip.price" name="price" type="number" required>
    </div>

    <div class="form-group">
      <label>תיאור</label>
      <textarea [(ngModel)]="trip.description" name="description" required></textarea>
    </div>

    <div class="form-group">
      <label>קישור לתמונה</label>
      <input [(ngModel)]="trip.image" name="image" required>
    </div>

    <div class="form-buttons">
      <button type="submit" class="btn-primary">עדכן</button>
      <button type="button" (click)="cancel()" class="btn-secondary">ביטול</button>
    </div>
  </form>
</div>
