<div class="login-container">
  <div class="login-box">
    <h2>התחברות</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">שם משתמש</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="username" 
          name="username" 
          required>
      </div>
      <div class="form-group">
        <label for="password">סיסמה</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          required>
      </div>
      @if (errorMessage) {
        <div class="error">{{ errorMessage }}</div>
      }
      <button type="submit" class="btn-primary">התחבר</button>
      <p class="register-link">
        אין לך חשבון? <a routerLink="/register">הירשם כאן</a>
      </p>
    </form>
  </div>
</div>
