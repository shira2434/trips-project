<div class="register-container">
  <div class="register-box">
    <h2>הרשמה</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">שם משתמש</label>
        <input 
          type="text" 
          id="username" 
          [(ngModel)]="username" 
          name="username" 
          required>
      </div>
      <div class="form-group">
        <label for="password">סיסמה</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          required>
      </div>
      <div class="form-group">
        <label for="verifyPassword">אימות סיסמה</label>
        <input 
          type="password" 
          id="verifyPassword" 
          [(ngModel)]="verifyPassword" 
          name="verifyPassword" 
          required>
      </div>
      @if (errorMessage) {
        <div class="error">{{ errorMessage }}</div>
      }
      <button type="submit" class="btn-primary">הירשם</button>
      <p class="login-link">
        כבר יש לך חשבון? <a routerLink="/login">התחבר כאן</a>
      </p>
    </form>
  </div>
</div>
